<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bermain - Math Penalty</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <header class="hud">
        <div class="stat"><span class="icon">❤️</span> <span id="lives">3</span></div>
        <div class="stat"><span class="icon">⭐</span> <span id="score">0</span></div>
        <div class="stat"><span class="icon">💰</span> <span id="coins">0</span></div>
        <div class="stat"><span class="icon">🔥</span> <span id="combo">x1</span></div>
    </header>

    <main class="game-area">
        <div class="stadium-bg"></div>
        
        <div id="goalkeeper" class="character goalkeeper">🧤</div>
        <div id="ball" class="ball">⚽</div>
        <div id="player" class="character player">🏃</div>

        <div id="feedback" class="feedback-text hidden">GOOOL!</div>
    </main>

    <section class="question-board">
        <h2 id="question-text">Memuat Soal...</h2>
        <div class="options-grid" id="options-container">
            </div>
    </section>

    <script src="js/save.js"></script>
    <script src="js/question.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
